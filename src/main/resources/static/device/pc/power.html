<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电脑远程控制</title>
    <link rel="stylesheet" href="/css/app-theme.css?v=20260614-theme-icon">
    <script src="/js/app-theme.js?v=20260614-theme-icon"></script>
    <style>
        .power-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }

        .pc-card {
            min-width: 0;
            padding: 18px;
        }

        .pc-card h2 {
            margin: 0 0 10px;
            font-size: 18px;
            line-height: 1.4;
        }

        .pc-meta {
            display: grid;
            gap: 6px;
            margin: 0 0 16px;
            color: var(--hc-muted);
            font-size: 14px;
            line-height: 1.55;
        }

        .pc-status {
            min-height: 22px;
            margin-top: 12px;
            color: var(--hc-accent);
            font-size: 14px;
            line-height: 1.5;
        }

        .pc-status.error {
            color: var(--hc-danger);
        }

        .empty-state {
            padding: 44px 18px;
            text-align: center;
        }
    </style>
</head>
<body class="hc-app">
<main class="hc-shell hc-stack">
    <header class="hc-topbar">
        <div class="hc-title-block">
            <p class="hc-eyebrow">PC Control</p>
            <h1 class="hc-title">电脑远程控制</h1>
            <p class="hc-subtitle">统一管理客户端开机、关机指令，适配桌面和移动端操作。</p>
        </div>
        <div class="hc-actions">
            <button class="hc-theme-toggle" type="button" aria-label="切换深浅色主题">
                <span class="hc-theme-toggle-icon" aria-hidden="true"></span>
                <span data-theme-toggle-text>深色</span>
            </button>
            <a class="hc-button" href="/device/pc/monitor.html">客户端管理</a>
            <button id="powerAllOn" class="hc-button hc-button-primary" type="button">全部开机</button>
            <button id="powerAllOff" class="hc-button" type="button">全部关机</button>
        </div>
    </header>

    <section id="deviceList" class="power-layout" aria-live="polite">
        <div class="hc-panel empty-state hc-muted">设备加载中...</div>
    </section>
</main>

<script>
    (function () {
        var devices = [];
        var list = document.getElementById('deviceList');
        var allOn = document.getElementById('powerAllOn');
        var allOff = document.getElementById('powerAllOff');

        function escapeHtml(value) {
            return window.HomeCenter.escapeHtml(value);
        }

        function render() {
            if (!devices.length) {
                list.innerHTML = '<div class="hc-panel empty-state hc-muted">暂无电脑设备</div>';
                return;
            }
            list.innerHTML = devices.map(function (device) {
                return '<article class="hc-panel pc-card" data-device-id="' + escapeHtml(device.id) + '">' +
                    '<h2>' + escapeHtml(device.name || '未命名电脑') + '</h2>' +
                    '<div class="pc-meta">' +
                    '<span>' + escapeHtml(device.description || '暂无描述') + '</span>' +
                    '<span>IP: ' + escapeHtml(device.ipAddress || '-') + '</span>' +
                    '<span>MAC: ' + escapeHtml(device.macAddress || '-') + '</span>' +
                    '</div>' +
                    '<div class="hc-actions">' +
                    '<button class="hc-button hc-button-primary" type="button" data-action="on">开机</button>' +
                    '<button class="hc-button" type="button" data-action="off">关机</button>' +
                    '</div>' +
                    '<div class="pc-status" data-status></div>' +
                    '</article>';
            }).join('');
        }

        function setCardLoading(card, loading) {
            Array.prototype.forEach.call(card.querySelectorAll('button[data-action]'), function (button) {
                button.disabled = loading;
            });
        }

        function setStatus(card, text, error) {
            var status = card.querySelector('[data-status]');
            status.textContent = text || '';
            status.classList.toggle('error', Boolean(error));
        }

        function sendPowerCommand(action, deviceId) {
            var card = list.querySelector('[data-device-id="' + deviceId + '"]');
            if (!card) {
                return Promise.resolve();
            }
            setCardLoading(card, true);
            setStatus(card, '正在发送指令...', false);
            return window.HomeCenter.post('/device/pc/power/' + deviceId + '/' + action)
                .then(function (result) {
                    if (result.status !== 'success') {
                        throw new Error(result.message || '操作失败');
                    }
                    setStatus(card, result.message || '指令已发送', false);
                    window.HomeCenter.toast(result.message || '指令已发送', 'success');
                })
                .catch(function (error) {
                    var message = '操作失败: ' + (error.message || '未知错误');
                    setStatus(card, message, true);
                    window.HomeCenter.toast(message, 'error');
                })
                .finally(function () {
                    setCardLoading(card, false);
                });
        }

        function handleGlobalAction(action) {
            allOn.disabled = true;
            allOff.disabled = true;
            Promise.all(devices.map(function (device) {
                return sendPowerCommand(action, device.id);
            })).then(function () {
                window.HomeCenter.toast('已发送' + (action === 'on' ? '开机' : '关机') + '指令到所有电脑', 'success');
            }).finally(function () {
                allOn.disabled = false;
                allOff.disabled = false;
            });
        }

        list.addEventListener('click', function (event) {
            var button = event.target.closest('button[data-action]');
            if (!button) {
                return;
            }
            var card = button.closest('[data-device-id]');
            sendPowerCommand(button.getAttribute('data-action'), card.getAttribute('data-device-id'));
        });

        allOn.addEventListener('click', function () {
            handleGlobalAction('on');
        });
        allOff.addEventListener('click', function () {
            handleGlobalAction('off');
        });

        window.HomeCenter.get('/device/pc/devices')
            .then(function (result) {
                devices = result.data || [];
                render();
            })
            .catch(function () {
                list.innerHTML = '<div class="hc-panel empty-state hc-muted">设备加载失败</div>';
                window.HomeCenter.toast('加载设备列表失败', 'error');
            });
    })();
</script>
</body>
</html>
