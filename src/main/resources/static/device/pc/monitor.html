<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客户端管理</title>
    <link rel="stylesheet" href="/css/app-theme.css">
    <link rel="stylesheet" href="/css/common.css">
    <script src="/js/app-theme.js"></script>
    <style>
        .monitor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 22px;
        }

        @media (min-width: 1360px) {
            .monitor-grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }

        .pc-card {
            position: relative;
            min-width: 0;
            cursor: pointer;
            user-select: none;
            transition: transform 0.18s ease, filter 0.18s ease;
        }

        .pc-card:hover {
            transform: translateY(-2px);
            filter: drop-shadow(0 18px 28px rgba(31, 41, 55, 0.14));
        }

        .monitor-frame {
            padding: 12px 12px 10px;
            border-radius: 16px;
            background: linear-gradient(180deg, #111827 0%, #030712 100%);
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.24), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        }

        .screen {
            position: relative;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            border: 1px solid #263244;
            border-radius: 10px;
            background: #0b1120;
        }

        .screen img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .screen-empty,
        .screen-loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #94a3b8;
            background: radial-gradient(circle at top, #1f2937 0%, #0b1120 60%);
        }

        .screen-loading {
            z-index: 2;
            background: rgba(11, 17, 32, 0.82);
        }

        .pc-icon {
            width: 58px;
            height: 42px;
            border: 4px solid #64748b;
            border-radius: 8px;
            position: relative;
        }

        .pc-icon:before {
            content: "";
            position: absolute;
            left: 19px;
            bottom: -16px;
            width: 12px;
            height: 12px;
            background: #64748b;
        }

        .pc-icon:after {
            content: "";
            position: absolute;
            left: 9px;
            bottom: -21px;
            width: 32px;
            height: 5px;
            border-radius: 999px;
            background: #64748b;
        }

        .spinner {
            width: 34px;
            height: 34px;
            border: 3px solid rgba(148, 163, 184, 0.25);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .monitor-neck {
            width: 22%;
            height: 18px;
            margin: 0 auto;
            background: linear-gradient(180deg, #273449 0%, #111827 100%);
        }

        .monitor-base {
            width: 44%;
            height: 12px;
            margin: 0 auto;
            border-radius: 0 0 12px 12px;
            background: #111827;
            box-shadow: 0 8px 14px rgba(15, 23, 42, 0.18);
        }

        .device-info {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 14px 4px 0;
        }

        .device-name {
            overflow: hidden;
            color: var(--hc-text);
            font-size: 16px;
            font-weight: 800;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .device-ip {
            margin-top: 4px;
            color: var(--hc-muted);
            font-size: 13px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--hc-muted);
            font-size: 13px;
            white-space: nowrap;
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #9ca3af;
            box-shadow: 0 0 0 3px rgba(156, 163, 175, 0.18);
        }

        .status-pill.online .status-dot {
            background: var(--hc-success);
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.16);
        }

        .action-menu {
            position: absolute;
            right: 14px;
            top: 48px;
            z-index: 5;
            min-width: 168px;
            padding: 8px;
            border: 1px solid var(--hc-line);
            border-radius: 12px;
            background: var(--hc-surface-strong);
            box-shadow: var(--hc-shadow-soft);
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 10px;
            border: 0;
            border-radius: 8px;
            color: var(--hc-text);
            background: transparent;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
        }

        .menu-item:hover {
            background: var(--hc-soft-accent);
            color: var(--hc-accent);
        }

        .empty-state {
            grid-column: 1 / -1;
            padding: 56px 20px;
            text-align: center;
        }

        .terminal-body {
            height: min(70vh, 680px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 8px;
            background: #050b12;
            color: #d1fae5;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        }

        .terminal-output {
            flex: 1;
            overflow: auto;
            padding: 18px;
            font-size: 13px;
            line-height: 1.55;
        }

        .terminal-line {
            white-space: pre-wrap;
            word-break: break-word;
        }

        .terminal-line.command {
            color: #93c5fd;
        }

        .terminal-line.stderr {
            color: #fca5a5;
        }

        .terminal-line.system {
            color: #a7f3d0;
        }

        .terminal-input {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            border-top: 1px solid rgba(148, 163, 184, 0.18);
            background: #08111f;
        }

        .terminal-input input {
            flex: 1;
            min-width: 0;
            border: 0;
            outline: 0;
            color: #f8fafc;
            background: transparent;
            font: inherit;
        }

        @media (max-width: 679px) {
            .action-menu {
                left: 14px;
                right: 14px;
                top: auto;
                bottom: 58px;
            }
        }
    </style>
</head>
<body class="hc-app">
<main class="hc-shell hc-stack">
    <header class="hc-topbar">
        <div class="hc-title-block">
            <p class="hc-eyebrow">PC Monitor</p>
            <h1 class="hc-title">客户端管理</h1>
            <p id="deviceSummary" class="hc-subtitle">设备加载中...</p>
        </div>
        <div class="hc-actions">
            <button class="hc-theme-toggle" type="button" aria-label="切换深浅色主题">
                <span class="hc-theme-toggle-icon" aria-hidden="true"></span>
                <span data-theme-toggle-text>深色</span>
            </button>
            <button id="refreshScreenshots" class="hc-button" type="button">刷新截图</button>
            <a class="hc-button" href="/device/pc/power.html">电源控制</a>
        </div>
    </header>

    <section id="deviceGrid" class="monitor-grid" aria-live="polite">
        <div class="hc-panel empty-state hc-muted">设备加载中...</div>
    </section>
</main>

<div id="terminalModal" class="modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="terminalTitle" class="modal-title">Shell</h2>
                <button class="btn-close" type="button" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body">
                <div class="terminal-body">
                    <div id="terminalOutput" class="terminal-output"></div>
                    <div class="terminal-input">
                        <span>$</span>
                        <input id="terminalInput" type="text" autocomplete="off">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function () {
        var devices = [];
        var activeDeviceId = null;
        var terminalDevice = null;
        var terminalLines = [];
        var terminalLoading = false;
        var commandHistory = [];
        var historyIndex = -1;
        var grid = document.getElementById('deviceGrid');
        var summary = document.getElementById('deviceSummary');
        var refreshButton = document.getElementById('refreshScreenshots');
        var terminalModal = new HcModal(document.getElementById('terminalModal'));
        var terminalTitle = document.getElementById('terminalTitle');
        var terminalOutput = document.getElementById('terminalOutput');
        var terminalInput = document.getElementById('terminalInput');

        function escapeHtml(value) {
            return window.HomeCenter.escapeHtml(value);
        }

        function latestScreenshotUrl(deviceId) {
            return '/device/pc/' + deviceId + '/screenshot/latest?t=' + Date.now();
        }

        function render() {
            summary.textContent = devices.length + ' 台设备 · 截图每 60 秒自动刷新';
            if (!devices.length) {
                grid.innerHTML = '<div class="hc-panel empty-state hc-muted">暂无客户端设备</div>';
                return;
            }
            grid.innerHTML = devices.map(function (device) {
                var online = Number(device.status) === 1;
                var image = device.screenshotUrl && !device.noScreenshot ?
                    '<img src="' + escapeHtml(device.screenshotUrl) + '" alt="' + escapeHtml((device.name || '') + ' 截图') + '" data-screenshot="' + escapeHtml(device.id) + '">' :
                    '';
                var empty = device.noScreenshot ? '<div class="screen-empty"><span class="pc-icon"></span><span>暂无截图</span></div>' : '';
                var loading = device.loading ? '<div class="screen-loading"><span class="spinner"></span><span>截图加载中</span></div>' : '';
                var menu = activeDeviceId === device.id ? '<div class="action-menu">' +
                    '<button class="menu-item" type="button" data-action="screenshot">截图</button>' +
                    '<button class="menu-item" type="button" data-action="terminal">终端</button>' +
                    '<a class="menu-item" href="/device/pc/power.html">电源</a>' +
                    '</div>' : '';

                return '<article class="pc-card" data-device-id="' + escapeHtml(device.id) + '">' +
                    '<div class="monitor-frame"><div class="screen">' + image + empty + loading + '</div></div>' +
                    '<div class="monitor-neck"></div><div class="monitor-base"></div>' +
                    '<div class="device-info">' +
                    '<div><div class="device-name" title="' + escapeHtml(device.name || '') + '">' + escapeHtml(device.name || '未命名设备') + '</div>' +
                    '<div class="device-ip">' + escapeHtml(device.ipAddress || '未配置 IP') + '</div></div>' +
                    '<div class="status-pill ' + (online ? 'online' : '') + '"><span class="status-dot"></span><span>' + (online ? '在线' : '离线') + '</span></div>' +
                    '</div>' + menu + '</article>';
            }).join('');

            Array.prototype.forEach.call(grid.querySelectorAll('img[data-screenshot]'), function (img) {
                img.addEventListener('load', function () {
                    updateScreenshotState(img.getAttribute('data-screenshot'), false, false);
                });
                img.addEventListener('error', function () {
                    updateScreenshotState(img.getAttribute('data-screenshot'), false, true);
                });
            });
        }

        function updateScreenshotState(deviceId, loading, noScreenshot) {
            var device = devices.find(function (item) {
                return String(item.id) === String(deviceId);
            });
            if (!device) {
                return;
            }
            if (device.loading === loading && device.noScreenshot === noScreenshot) {
                return;
            }
            device.loading = loading;
            device.noScreenshot = noScreenshot;
            render();
        }

        function refreshAllScreenshots() {
            if (!devices.length) {
                return;
            }
            refreshButton.disabled = true;
            devices.forEach(function (device) {
                device.loading = true;
                device.noScreenshot = false;
                device.screenshotUrl = latestScreenshotUrl(device.id);
            });
            render();
            window.setTimeout(function () {
                refreshButton.disabled = false;
            }, 800);
        }

        function captureScreenshot(device) {
            activeDeviceId = null;
            device.loading = true;
            device.noScreenshot = false;
            render();
            window.HomeCenter.post('/device/pc/' + device.id + '/screenshot')
                .then(function (result) {
                    if (result.status !== 'success') {
                        throw new Error(result.message || '截图失败');
                    }
                    device.screenshotUrl = latestScreenshotUrl(device.id);
                    window.HomeCenter.toast(result.message || '截图已更新', 'success');
                    render();
                })
                .catch(function (error) {
                    device.loading = false;
                    window.HomeCenter.toast(error.message || '截图失败', 'error');
                    render();
                });
        }

        function renderTerminal() {
            terminalOutput.innerHTML = terminalLines.map(function (line) {
                return '<div class="terminal-line ' + escapeHtml(line.type || '') + '">' + escapeHtml(line.text) + '</div>';
            }).join('');
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        function openTerminal(device) {
            activeDeviceId = null;
            terminalDevice = device;
            terminalTitle.textContent = device.name + ' · Shell';
            terminalLines = [{type: 'system', text: '已连接到 ' + device.name + ' (' + (device.ipAddress || '-') + ')'}];
            terminalInput.value = '';
            historyIndex = commandHistory.length;
            render();
            renderTerminal();
            terminalModal.show();
            window.setTimeout(function () {
                terminalInput.focus();
            }, 30);
        }

        function executeTerminalCommand() {
            var command = terminalInput.value.trim();
            if (!command || !terminalDevice || terminalLoading) {
                return;
            }
            terminalLines.push({type: 'command', text: '$ ' + command});
            commandHistory.push(command);
            historyIndex = commandHistory.length;
            terminalInput.value = '';
            terminalLoading = true;
            renderTerminal();

            window.HomeCenter.post('/device/pc/command/' + terminalDevice.id, {
                command: command,
                timeoutSeconds: 60
            }).then(function (result) {
                if (result.status !== 'success') {
                    throw new Error(result.message || '命令执行失败');
                }
                var data = result.data || {};
                if (data.stdout) {
                    terminalLines.push({type: 'stdout', text: data.stdout});
                }
                if (data.stderr) {
                    terminalLines.push({type: 'stderr', text: data.stderr});
                }
                if (data.error) {
                    terminalLines.push({type: 'stderr', text: data.error});
                }
                if (!data.stdout && !data.stderr && !data.error) {
                    terminalLines.push({type: 'system', text: 'exitCode=' + data.exitCode});
                }
            }).catch(function (error) {
                terminalLines.push({type: 'stderr', text: error.message || '命令执行失败'});
            }).finally(function () {
                terminalLoading = false;
                renderTerminal();
                terminalInput.focus();
            });
        }

        grid.addEventListener('click', function (event) {
            var card = event.target.closest('[data-device-id]');
            if (!card) {
                activeDeviceId = null;
                render();
                return;
            }
            var device = devices.find(function (item) {
                return String(item.id) === String(card.getAttribute('data-device-id'));
            });
            var action = event.target.closest('[data-action]');
            if (action && device) {
                if (action.getAttribute('data-action') === 'screenshot') {
                    captureScreenshot(device);
                }
                if (action.getAttribute('data-action') === 'terminal') {
                    openTerminal(device);
                }
                return;
            }
            activeDeviceId = activeDeviceId === device.id ? null : device.id;
            render();
        });

        document.addEventListener('click', function (event) {
            if (!event.target.closest('.pc-card')) {
                activeDeviceId = null;
                render();
            }
        });

        refreshButton.addEventListener('click', refreshAllScreenshots);
        terminalInput.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                executeTerminalCommand();
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                historyIndex = Math.max(0, historyIndex - 1);
                terminalInput.value = commandHistory[historyIndex] || '';
            } else if (event.key === 'ArrowDown') {
                event.preventDefault();
                historyIndex = Math.min(commandHistory.length, historyIndex + 1);
                terminalInput.value = commandHistory[historyIndex] || '';
            }
        });

        window.HomeCenter.get('/device/pc/devices')
            .then(function (result) {
                devices = (result.data || []).map(function (device) {
                    device.loading = true;
                    device.noScreenshot = false;
                    device.screenshotUrl = latestScreenshotUrl(device.id);
                    return device;
                });
                render();
            })
            .catch(function () {
                summary.textContent = '设备加载失败';
                grid.innerHTML = '<div class="hc-panel empty-state hc-muted">设备加载失败</div>';
                window.HomeCenter.toast('加载设备列表失败', 'error');
            });

        window.setInterval(refreshAllScreenshots, 60000);
    })();
</script>
</body>
</html>
