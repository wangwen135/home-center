<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>时间日期天气</title>
    <link rel="stylesheet" href="/css/app-theme.css">
    <link rel="stylesheet" href="/css/common.css">

    <script src="/js/app-theme.js"></script>
    <style>
        html {
            width: 100%;
            height: 100%;
        }

        /*kindle屏幕显示区域 高度：413 宽度：600*/
        body {
            color: var(--hc-text);
            background-color: var(--hc-bg);
            width: 100%;
            height: 100%;
            margin: 0px;
            text-align: center;
        }

        .page {
            width: 100%;
            height: 100%;
            display: table;
        }

        .top {
            /*padding: 8px;*/
        }

        .date-container {
            padding-top: 5px;
            width: 100%;
            text-align: left;
        }

        .date {
            /*float: left;*/
            padding-left: 10px;
            font-size: 2.2rem;
        }

        .nongli {
            float: right;
            padding-right: 12px;
            font-size: 2.2rem;
        }

        .time-container {

        }

        .weather-container {
            float: left;
            text-align: left;
            padding-top: 10px;
            padding-left: 10px;
            font-size: 1.1rem;
        }

        .time {
            padding-top: 5px;
            font-size: 6.2rem;
        }

        .w-tips {
            padding-left: 10px;
            text-align: left;
            font-size: 1.2rem;
        }

        .split {
            margin-top: 2px;
            margin-bottom: 2px;
            width: 100%;
            height: 3px;
            background-color: var(--hc-text)
        }

        .famous-row {
            font-size: 2.6rem;
            height: 100%;
            display: table-row;
            vertical-align: middle;
        }

        .famous-cell {
            display: table-cell;
            vertical-align: middle;
        }

        .msg {
            padding: 5px;
            font-size: 1.4rem;
        }

        .screen-theme-toggle {
            position: fixed;
            top: 6px;
            right: 6px;
            z-index: 5;
            min-height: 28px;
            padding: 0 8px;
            opacity: 0.32;
        }

        .screen-theme-toggle:hover {
            opacity: 1;
        }

    </style>
</head>

<body class="hc-app">
<button class="hc-theme-toggle screen-theme-toggle" type="button" aria-label="切换深浅色主题">
    <span data-theme-toggle-text>深色</span>
</button>
<div class="page">
    <div id="top" class="top">
        <div class="date-container">
            <span class="date" id="date">4月28日 星期三</span>
            <span class="nongli" id="nongli">农历初三</span>
        </div>
        <div class="time-container">
            <div class="weather-container">
                <div class="align-center">
                    <img id="w_icon" width="40" height="40" src="/weather/hefeng/icons/100.svg">
                    <span id="w_text">晴</span>
                </div>
                <div class="pt-5px">温度：<span id="w_temp">16</span> ℃</div>
                <div class="pt-5px">体感：<span id="w_feelsLike">13</span> ℃</div>
            </div>
            <div class="time" id="time">22:27</div>
            <div class="w-tips" id="w-tips">今天天气很好哦，出去运动吧！</div>
        </div>
        <div id="split" class="split"></div>
    </div>

    <div class="famous-row">
        <div id="famous" class="famous-cell">
            读书破万卷，<br>
            下笔如有神。
        </div>
    </div>

    <div id="msg" class="msg">
        这是一个测试消息<br>
        消息可能会为空<br>
        消息支持html语法
    </div>

</div>


<script>
    function updateTime() {
        var date = new Date()
        var utc8DiffMinutes = date.getTimezoneOffset() + 480
        date.setMinutes(date.getMinutes() + utc8DiffMinutes)
        var timeString = date.getHours() + ':' + ('0' + date.getMinutes()).slice(-2)
        document.getElementById("time").innerHTML = timeString
        var h = date.getHours();
        var m = date.getMinutes();
        if (h == 0 && m < 3) {
            updateDateAndWeek();
            updateNongLi();
        }
        if (m % 15 == 0) {
            updateWeather();
        }
        if (m % 10 == 0) {
            updateFamous();
            updatePromptMessage();
        }
    }

    updateTime()

    function updateDateAndWeek() {
        var date = new Date()
        var utc8DiffMinutes = date.getTimezoneOffset() + 480
        date.setMinutes(date.getMinutes() + utc8DiffMinutes)
        var dateString = (date.getMonth() + 1) + '月' + date.getDate() + '日'
        var weekList = ['日', '一', '二', '三', '四', '五', '六']
        var weekString = '星期' + weekList[date.getDay()]
        document.getElementById("date").innerHTML = dateString + ' ' + weekString
    }

    updateDateAndWeek();

    function updateNongLi() {
        getData("/smartScreen/getNongLiShort", function (result) {
            if (result) {
                document.getElementById("nongli").innerHTML = result;
            }
        });
    }

    updateNongLi();

    function updateFamous() {
        getData("/smartScreen/getRandomFamous", function (result) {
            if (result) {
                document.getElementById("famous").innerHTML = result;
            }
        });
    }

    updateFamous();

    function updatePromptMessage() {
        getData("/smartScreen/getPromptMessage", function (result) {
            var message = "";
            if (result != null && result != '') {
                message = result.message;
            }
            document.getElementById("msg").innerHTML = message;
        });
    }

    updatePromptMessage();

    function updateWeather() {
        getData("/weather/getWeather", function (result) {
            if (!result) {
                return;
            }
            document.getElementById("w_icon").src = result.iconUrl;
            document.getElementById("w_text").innerHTML = result.text;
            document.getElementById("w_temp").innerHTML = result.temp;
            document.getElementById("w_feelsLike").innerHTML = result.feelsLike;
            document.getElementById("w-tips").innerHTML = result.tips;
        });
    }

    updateWeather();

    function getData(url, callback) {
        window.HomeCenter.get(url)
            .then(callback)
            .catch(function () {
                callback(null);
            });
    }

    function refPreMinute() {
        updateTime();
        //计算定时器，每分钟更新一次
        var date = new Date()
        var next = 60 - date.getSeconds() + 1;
        next = next * 1000;
        setTimeout(refPreMinute, next);
    }

    refPreMinute();

</script>
</body>
</html>
