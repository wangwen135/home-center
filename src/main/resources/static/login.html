<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录界面</title>
    <style>

        body {
            background-color: #121212ba; /* 深色背景色 */
            color: #fff; /* 文字颜色 */
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: #1e1e1e; /* 登录框背景色 */
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            width: 300px;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
			font-size: 14px;
        }

        .form-group input {
		    box-sizing: border-box;
            width: 100%;
            padding: 8px;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #333;
            color: #fff;
        }

        .form-group button {
            width: 100%;
		    margin-top: 15px;
            padding: 10px;
            border: none;
            border-radius: 4px;
            background-color: #4CAF50; /* 按钮颜色 */
            color: #fff;
            cursor: pointer;
        }

        .form-group button:hover {
            background-color: #45a049; /* 鼠标悬停时的按钮颜色 */
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h3>用户登录</h3>
        <form>
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">密 &nbsp; 码</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <button type="submit">登 &nbsp;&nbsp; 录</button>
            </div>
        </form>
    </div>
</body>

</html>
