<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Markdown编辑器</title>

<!--    <script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"></script>-->
<!--    <link rel="stylesheet"-->
<!--          href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">-->

    <script src="/markdown/showdown-2.1.0/showdown.min.js"></script>
    <link rel="stylesheet" href="/markdown/github-markdown-css-5.2.0/github-markdown.css">

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .page {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            /*justify-content: flex-start;*/
            /*align-items: stretch;*/

        }

        /*标题*/
        .note-title {
            padding-left: 10px;
            padding-right: 10px;
        }

        .note-title h1 {
            font-size: 22px;
            /*font-family: cursive;*/
            margin-top: 8px;
            margin-bottom: 8px;
        }

        /*工具栏*/
        .toolbar {
            padding-left: 10px;
            padding-right: 10px;
        }

        /*文本编辑器*/
        .editor-wrapper {
            flex-grow: 1;

            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: center;
            align-items: stretch;
            width: 100%;
            /*padding-top: 65px;*/

            padding: 0px 10px 10px 10px;

            box-sizing: border-box;
            overflow: hidden;
        }

        /*文本编辑部分*/
        .editor-textarea {
            /*flex-grow: 0.8;*/

            resize: none;
            font-family: Consolas, Courier;
            font-size: 14px;
            /*height: 97%;*/
            /*max-height: 97%;*/
            width: 100%;
            /*overflow-y: scroll;*/
            background: #f6f8fa;
            padding: 10px;

            box-sizing: border-box;

        }
        .divider{
            width: 10px;
            background: #eee;
            cursor: pointer;
        }
        .divider:hover{
            background: #8b949e;
        }

        /*markdown渲染部分*/
        .editor-preview {
            /*flex-grow: 1;*/

            /*height: 97%;*/
            /*max-height: 97%;*/
            /*height: calc(100% - 65px);*/
            border: 1px solid #eee;
            overflow-y: scroll;
            width: 100%;
            padding: 10px;
            display: block;
            /*margin-left: 10px;*/
            /*margin-right: 10px;*/
            /*max-height: 100%;*/

            box-sizing: border-box;

            display: flex;
            justify-content: center;
        }

        .content{
            max-width: 980px;
        }

    </style>
</head>
<body>
<div class="page">
    <div class="note-title">
        <h1>
            Markdown编辑器
        </h1>

    </div>
    <div class="toolbar">
        这里是工具条
        <button>按钮1</button>
        <button>按钮2</button>
        <button>按钮3</button>
        <button>按钮4</button>
        <button>按钮5</button>
    </div>

    <div id="editor-wrapper" class="editor-wrapper">
        <textarea id="editor" class="editor-textarea"></textarea>
        <div class="divider"></div>
        <div id="preview" class="editor-preview ">
            <div id="content" class="content markdown-body"></div>
        </div>
    </div>

</div>

<script>
    const converter = new showdown.Converter();
    // converter.setOption('moreStyling', 'true');
    converter.setFlavor('github');


    const editor = document.getElementById('editor');
    const content = document.getElementById('content');

    function render() {
        let html = converter.makeHtml(editor.value);
        content.innerHTML = html;
    }


    editor.addEventListener('propertychange', render);
    editor.addEventListener('input', render);

</script>

</body>
</html>
