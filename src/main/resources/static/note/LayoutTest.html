<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>markdown测试</title>

    <script src="/markdown/showdown-2.1.0/showdown.min.js"></script>

    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        .page {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;

        }

        .note-title {
            padding-left: 10px;
            padding-right: 10px;
        }

        .note-title h1 {
            font-size: 22px;
            font-family: cursive;
            margin-top: 8px;
            margin-bottom: 8px;
        }

        .toolbar {
            padding-left: 10px;
            padding-right: 10px;
        }

        /*文本编辑器*/
        .editor-wrapper {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: center;
            align-items: stretch;
            width: 100%;
            height: 100%;
            /*padding-top: 65px;*/
            box-sizing: border-box;

        }

        /*文本编辑部分*/
        .editor-textarea {
            resize: none;
            /*font-family: Consolas, "Liberation Mono", Courier, monospace;*/
            height: 97%;
            max-height: 97%;
            width: 45%;
            margin-left: 10px;
            box-sizing: border-box;

        }

        /*markdown渲染部分*/
        .editor-preview {
            height: 97%;
            max-height: 97%;
            border: 1px solid #eee;
            overflow-y: scroll;
            width: 55%;
            padding: 10px;
            display: block;
            /*width: 50%;*/
            margin-left: 10px;
            margin-right: 10px;
            max-height: 100%;
            box-sizing: border-box;

        }

    </style>
</head>
<body>
<div class="page">
    <div class="note-title">
        <h1>
            这里是这一篇笔记的标题 Markdown编辑器
        </h1>

    </div>
    <div class="toolbar">
        这里是工具条
        <button>按钮1</button>
        <button>按钮2</button>
        <button>按钮3</button>
        <button>按钮4</button>
        <button>按钮5</button>
    </div>
    <div id="editor-wrapper" class="editor-wrapper">
        <textarea id="editor" class="editor-textarea"></textarea>
        <div id="preview" class="editor-preview"></div>
    </div>

</div>
</body>
</html>
