<!DOCTYPE html>
<html lang="zh_CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="View one">
    <meta name="author" content="wwh">
    <title>Note View</title>

    <link rel="stylesheet" href="../bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="../bootstrap/icons/font/bootstrap-icons.css">
    <script src="../bootstrap/js/bootstrap.bundle.js"></script>
    <script src="../js/showdown/showdown.js"></script>
    <link rel="stylesheet" href="../css/github-markdown/github-markdown.css">

    <link rel="stylesheet" href="../css/common.css">
    <script src="../js/main.js"></script>
    <link rel="stylesheet" href="css/note.css">

    <script src="../js/html2canvas/html2canvas.js"></script>

</head>
<body>
<div class="frame-container">

    <div>
        <div>
            <h2 id="noteTitle">测试用的Markdo.md</h2>
        </div>
        <div>
            修改时间：<span id="updateTime">2024-04-11 16:28:38</span>
        </div>
    </div>
    <div>
        <!--预览工具栏-->
        <div id="previewToolbar" class="editor-preview-toolbar ">
            <button id="p-tb-small" class="btn btn-control btn-p-sm ms-auto"
                    data-bs-toggle="tooltip" data-bs-placement="bottom" title="宽度 较窄">
                <span class="letter-icon">S</span>
            </button>
            <button id="p-tb-middle" class="btn btn-control btn-p-sm" data-select="true"
                    data-bs-toggle="tooltip" data-bs-placement="bottom" title="宽度 中等">
                <span class="letter-icon">M</span>
            </button>
            <button id="p-tb-large" class="btn btn-control btn-p-sm"
                    data-bs-toggle="tooltip" data-bs-placement="bottom" title="宽度 较宽">
                <span class="letter-icon">L</span>
            </button>
            <button id="p-tb-full" class="btn btn-control btn-p-sm"
                    data-bs-toggle="tooltip" data-bs-placement="bottom" title="宽度 拉满">
                <span class="letter-icon">F</span>
            </button>

            <!--分隔-->
            <span class="text-black-50 mx-1">|</span>


            <!--背景颜色下拉框-->
            <div class="dropdown d-inline-block">

                <div data-bs-toggle="dropdown" aria-expanded="false">
                    <button id="p-tb-bgColor" class="btn btn-control btn-p-sm dropdown-toggle"
                            data-bs-toggle="tooltip" data-bs-placement="bottom" title="背景颜色">
                        <i class="bi bi-palette"></i>
                    </button>
                </div>

                <ul id="tb-color-dropdown" class="dropdown-menu max-w-200px">
                    <li>
                        <button class="btn btn-control btn-p-sm dropdown-item bg-secondary-subtle"
                                data-color="#e2e3e5">
                            浅灰色
                        </button>
                    </li>
                    <li>
                        <button class="btn btn-control btn-p-sm dropdown-item bg-primary-subtle"
                                data-color="#cfe2ff">
                            浅蓝色
                        </button>
                    </li>
                    <li>
                        <button class="btn btn-control btn-p-sm dropdown-item bg-success-subtle"
                                data-color="#d1e7dd">
                            浅绿色
                        </button>
                    </li>
                    <li>
                        <button class="btn btn-control btn-p-sm dropdown-item bg-warning-subtle"
                                data-color="#fff3cd">
                            浅黄色
                        </button>
                    </li>
                    <li>
                        <button class="btn btn-control btn-p-sm dropdown-item bg-info-subtle"
                                data-color="#cff4fc">
                            蓝绿色
                        </button>
                    </li>
                    <li>
                        <button class="btn btn-control btn-p-sm dropdown-item " data-color="">
                            无背景
                        </button>
                    </li>
                </ul>
            </div>

            <!--分隔-->
            <span class="text-black-50 mx-1">|</span>

            <!--下载-->
            <button id="p-tb-download" class="btn btn-control btn-p-sm ms-auto"
                    data-bs-toggle="tooltip" data-bs-placement="bottom" title="下载文档图片">
                <!--<i class="bi bi-file-earmark-arrow-down"></i>-->
                <i class="bi bi-image"></i>
            </button>

            <!--全屏-->
            <button id="p-tb-fullscreen" class="btn btn-control btn-p-sm"
                    data-bs-toggle="tooltip" data-bs-placement="bottom" title="内容全屏">
                <i class="bi bi-arrows-fullscreen"></i>
            </button>


            <!--这个按钮在最右边 同步滚动-->
            <button id="tb-syncScroll" class="btn btn-control btn-p-sm ms-auto  sync-scrolling-icon"
                    data-select="true" data-bs-toggle="tooltip" data-bs-placement="bottom" title="同步滚动">
                <i class="bi bi-arrows-vertical"></i>
            </button>
        </div>
    </div>

    <div>

        目录 绝对定位
    </div>

    <div>
        目录 和 工具栏 在打印时隐藏？

        内容区域
    </div>

    <!-- 从这里开始全部重写-->


    <div class="note-content-container">


        <div class="editor-viewer">

            <div id="previewWrapper" class="viewer-wrapper">


                <div id="markdownContainer" class="markdown-container">
                    <div class="markdown-absolute-container">
                        <div class="markdown-absolute-toolbar">
                            <button id="btnCatalog" class="btn btn-control btn-p-xxs border border-secondary shadow-sm">
                                <i class="bi bi-list-columns-reverse"></i>
                            </button>
                        </div>
                        <div id="markdownCatalogContainer" class="markdown-catalog-container d-none">
                            <div class="markdown-catalog-title">目录</div>
                            <div id="markdownCatalogList" class="markdown-catalog-list"></div>
                        </div>
                    </div>
                    <div id="markdownScrollbar" class="markdown-scrollbar">
                        <div id="markdownContent" class="markdown-body markdown-content"></div>
                    </div>
                </div>

            </div>
        </div>

    </div>

</div>
<script>

</script>
</body>
</html>
