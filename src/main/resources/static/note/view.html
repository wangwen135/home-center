<!DOCTYPE html>
<html lang="zh_CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="wwh">
    <meta name="author" content="wwh">
    <title>Note</title>

    <link rel="stylesheet" href="../bootstrap/css/bootstrap.css">
    <link rel="stylesheet" href="../bootstrap/icons/font/bootstrap-icons.css">
    <script src="../bootstrap/js/bootstrap.bundle.js"></script>
    <script src="../js/showdown/showdown.js"></script>
    <link rel="stylesheet" href="../css/github-markdown/github-markdown.css">

    <link rel="stylesheet" href="../css/common.css">
    <script src="../js/main.js"></script>
    <script src="note.js"></script>
    <link rel="stylesheet" href="note.css">
</head>
<body>
<div class="note-container">

    <!--最左边的控制按钮-->
    <div id="control" class="note-control">
        <button id="btnToggleNoteList" class="btn btn-control" type="button">
            <i class="bi bi-chevron-bar-left ts d-inline-block"></i>
        </button>

        <button class="btn btn-control" type="button">
            <i class="bi bi-arrow-clockwise"></i>
        </button>

        <button class="btn btn-control" type="button">
            <i class="bi bi-calendar-week"></i>
        </button>

        <button class="btn btn-control" type="button">
            <i class="bi bi-terminal"></i>
        </button>

        <div class="mb-auto"></div>

        <button class="btn btn-control" type="button">
            <i class="bi bi-question-circle"></i>
        </button>
        <button class="btn btn-control " type="button">
            <i class="bi bi-gear"></i>
        </button>
    </div>

    <!--左边的列表区域-->
    <div id="noteList" class="note-list">
        <div class="menu-switch">
            <button class="btn btn-control " type="button">
                <i class="bi bi-folder"></i>
            </button>
            <button class="btn btn-control " type="button">
                <i class="bi bi-search"></i>
            </button>
            <button class="btn btn-control " type="button">
                <i class="bi bi-file-earmark-text"></i>
            </button>
            <button class="btn btn-control " type="button">
                <i class="bi bi-bookmark-star"></i>
            </button>
        </div>

        <div class="input-group input-group-sm my-2 d-none">
            <button class="btn btn-outline-secondary btn-sm" type="button">范围</button>
            <input type="text" class="form-control" placeholder="搜索...">
            <button class="btn btn-outline-secondary btn-sm"><i class="bi bi-sort-down"></i>
            </button>
        </div>
        <div class="tab-file-list">
            <div class="file-list-ctrl">
                <!--新建文件-->
                <button class="btn btn-control " type="button">
                    <i class="bi bi-file-earmark-plus"></i>
                </button>
                <!--新建文件夹-->
                <button class="btn btn-control " type="button">
                    <i class="bi bi-folder-plus"></i>
                </button>
                <!--排序-->
                <button class="btn btn-control " type="button">
                    <i class="bi bi-sort-down-alt"></i>
                </button>
                <!--展开-折叠-->
                <button class="btn btn-control " type="button">
                    <i class="bi bi-chevron-expand"></i>
                    <!--                    <i class="bi bi-chevron-contract"></i>-->
                </button>
            </div>
            <div id="noteListTree" class="tree">
                <ul>
                    <li>
                        <label data-type="DIR">根目录1</label>
                        <ul>
                            <li>
                                <label data-type="md" data-favorite="true" data-asterisk="true">新建markdown文件.md</label>
                            </li>
                            <li>
                                <label data-type="DIR">目录</label>
                                <ul>
                                    <li>
                                        <label data-type="md" data-favorite="true">文件xxx1.md</label>
                                    </li>
                                    <li>
                                        <label data-asterisk="true">这是一个很长很长的文件名它的长度超过了菜单的宽度测试展示效果</label>
                                    </li>
                                    <li>
                                        <label data-type="DIR">临时文件夹</label>
                                        <ul>
                                            <li><label data-type="txt">临时文件1.txt</label></li>
                                            <li><label data-type="json">临时文件2.json</label></li>
                                            <li>
                                                <label data-type="DIR">临时文件夹</label>
                                                <ul>
                                                    <li><label data-type="txt">临时文件1.txt</label></li>
                                                    <li><label data-type="json">临时文件2.json</label></li>
                                                </ul>
                                            </li>
                                        </ul>
                                    </li>
                                </ul>
                            </li>
                            <li>
                                <label data-asterisk="true" data-type="doc">文件2.doc</label>
                            </li>
                        </ul>
                    </li>
                    <li>
                        <label data-type="DIR">新建文件夹2</label>
                        <ul>
                            <li><label data-type="pdf" data-asterisk="true">文件3.pdf</label></li>
                            <li><label data-type="java">userService.java</label></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <div id="divider" class="note-divider">
        <!--左边的列表区域和内容区域的分割线-->
    </div>

    <div id="content" class="note-content">
        <div class="note-title-area">

            <div id="noteTitle" class="note-title" contenteditable="true" placeholder="请输入标题">动态文章标题.md</div>

            <div class="file-info-area">
                <div class="file-info-path">
                    <i class="bi bi-folder-symlink"></i>
                    <span>/2022-12-09_备份/硬件与软件/阿里云</span>
                </div>
                <div class="file-info-time">
                    <span>创建时间：2022-12-2 13:23:32</span><br>
                    <span>修改时间：2022-12-2 13:23:32</span>
                </div>
            </div>

            <div class="note-title-toolbar">
                <!--收藏-->
                <button id="btnToggleFavorite" class="btn btn-control btn-p-xxs" type="button">
                    <i class="bi bi-bookmark-heart"></i>
                </button>
                <!--加星-->
                <button id="btnToggleAsterisk" class="btn btn-control btn-p-xxs" type="button">
                    <i class="bi bi-star-fill"></i>
                </button>

                <button id="btnEditOrPreview" class="btn btn-control btn-p-xxs mx-3">
                    <i class="bi bi-eye"></i>
                    预览
                </button>

                <!--折叠编辑工具栏-->
                <button id="btnToggleEditorToolbar" class="btn btn-control btn-p-xxs">
                    <i class="bi bi-chevron-bar-up ts d-inline-block"></i>
                </button>

                <button id="setting" class="btn btn-control btn-p-xxs rounded-circle">
                    <i class="bi bi-three-dots-vertical ts d-inline-block"></i>
                </button>
            </div>
        </div>
        <div id="editorToolbar" class="editor-toolbar">
            <div class="text-nowrap">
                <!--粗体-->
                <button id="tb-bold" class="btn btn-control btn-p-sm" title="加粗 ctrl+b">
                    <i class="bi bi-type-bold"></i>
                </button>
                <!--斜体-->
                <button id="tb-italic" class="btn btn-control btn-p-sm" title="斜体 ctrl+i">
                    <i class="bi bi-type-italic"></i>
                </button>
                <!--下划线-->
                <button id="tb-underline" class="btn btn-control btn-p-sm" title="下划线 ctrl+u">
                    <i class="bi bi-type-underline"></i>
                </button>
                <!--删除线-->
                <button id="tb-strikethrough" class="btn btn-control btn-p-sm" title="删除线 ctrl+shift+s">
                    <i class="bi bi-type-strikethrough"></i>
                </button>

                <!--分隔-->
                <span class="text-black-50">|</span>

                <!--标题 需要弹出下拉框-->
                <div class="dropdown d-inline-block">
                    <button id="tb-headline" class="btn btn-control btn-p-sm dropdown-toggle" data-bs-toggle="dropdown"
                            aria-expanded="false" title="标题 ctrl+[1~6]">
                        <i class="bi bi-type-h1"></i>
                    </button>
                    <ul class="dropdown-menu min-w-2rem">
                        <li>
                            <button class="btn btn-control btn-p-sm dropdown-item">
                                <i class="bi bi-type-h1"></i> 一级标题
                            </button>
                        </li>
                        <li>
                            <button class="btn btn-control btn-p-sm dropdown-item">
                                <i class="bi bi-type-h2"></i> 二级标题
                            </button>
                        </li>
                        <li>
                            <button class="btn btn-control btn-p-sm dropdown-item">
                                <i class="bi bi-type-h3"></i> 三级标题
                            </button>
                        </li>
                        <li>
                            <button class="btn btn-control btn-p-sm dropdown-item">
                                <i class="bi bi-type-h4"></i> 四级标题
                            </button>
                        </li>
                        <li>
                            <button class="btn btn-control btn-p-sm dropdown-item">
                                <i class="bi bi-type-h5"></i> 五级标题
                            </button>
                        </li>
                        <li>
                            <button class="btn btn-control btn-p-sm dropdown-item">
                                <i class="bi bi-type-h6"></i> 六级标题
                            </button>
                        </li>
                    </ul>
                </div>

                <!--分隔-->
                <span class="text-black-50">|</span>

                <!--水平分割线-->
                <button class="btn btn-control btn-p-sm">
                    <i class="bi bi-dash-lg"></i>
                    <!--<i class="bi bi-hr"></i>-->
                </button>
                <!--引用-->
                <button class="btn btn-control btn-p-sm">
                    <!--<i class="bi bi-quote"></i>-->
                    <i class="bi bi-blockquote-left"></i>
                </button>
                <!--无序列表-->
                <button class="btn btn-control btn-p-sm">
                    <i class="bi bi-list-ul"></i>
                </button>
                <!--有序列表-->
                <button class="btn btn-control btn-p-sm">
                    <i class="bi bi-list-ol"></i>
                </button>
                <!--未勾选-->
                <button class="btn btn-control btn-p-sm">
                    <i class="bi bi-square"></i>
                </button>
                <!--已经勾选-->
                <button class="btn btn-control btn-p-sm">
                    <i class="bi bi-check-square"></i>
                </button>

                <!--分隔-->
                <span class="text-black-50">|</span>

                <!--表格-->
                <button id="tb-table" class="btn btn-control btn-p-sm">
                    <i class="bi bi-table"></i>
                </button>
                <!--图片-->
                <button id="tb-image" class="btn btn-control btn-p-sm">
                    <i class="bi bi-image"></i>
                </button>
                <!--链接-->
                <button id="tb-link" class="btn btn-control btn-p-sm">
                    <i class="bi bi-link-45deg"></i>
                </button>
                <!--代码块-->
                <button id="tb-code" class="btn btn-control btn-p-sm">
                    <i class="bi bi-code-square"></i>
                </button>
                <!--内嵌代码-->
                <button class="btn btn-control btn-p-sm">
                    <i class="bi bi-code"></i>
                </button>


            </div>

        </div>

        <div class="editor-viewer">
            <div id="editorWrapper" class="editor-wrapper">
                <textarea id="editor" class="editor-textarea"></textarea>
            </div>
            <div id="editorDivider" class="editor-divider"></div>
            <div id="preview" class="viewer-wrapper">
                <div id="markdownContent" class="markdown-body markdown_content"></div>
            </div>
        </div>

    </div>

</div>
<script>

</script>
</body>
</html>
