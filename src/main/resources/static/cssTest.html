<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS 测试</title>
    <style>

        body {
            background-color: black;

        }

        .container {
            position: relative;

        }

        .image {
            /*width: 100%;*/
            height: auto;
            display: block;
            position: relative;
        }

        .mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            mask-image: linear-gradient(rgba(0, 0, 0, 0), rgba(0, 0, 0, 1));
            -webkit-mask-image: linear-gradient(rgba(0, 0, 0, 0), rgba(0, 0, 0, 1));
        }

    </style>
</head>
<body>
<h3>用于测试css样式</h3>

<div class="container ">

    <img src="/common/img/view/test/little.jpg" alt="..." class="image ">
    <!--    <div class="mask"></div>-->

</div>


</body>
</html>
