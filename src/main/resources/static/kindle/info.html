<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>时间日期-信息展示</title>
    <script src="/js/jquery-3.6.1.min.js"></script>
    <style>
        body {
            color: #000000;
            background-color: #ffffff;
            /*
            width: 586px;
            height: 690px;

            overflow: hidden;
            */
            width: 100%;
            height: 100%;
        }

        .page {
            width: 100%;
            height: 100%;
        }

        .time_container,
        .date_container {
            width: 100%;
            #margin: auto;
            text-align: center;
        }

        .time_container {
            top: 0;
        }

        .date_container {
            top: 20px;
        }

        .time {
            padding-top: 10px;
            font-size: 10rem;
        }

        .date {
            padding-top: 20px;
            font-size: 4rem;
        }

        .nongli {
            padding-top: 20px;
            font-size: 4rem;
        }

        .split {
            width: 100%;
            height: 3px;
            background-color: #000000
        }

        .msg {
            padding-top: 20px;
            font-size: 3rem;
        }
    </style>
</head>

<body>
<div class="page">
    <div class="time_container">
        <div class="time" id="time">22:27</div>
    </div>

    <div class="date_container">
        <div class="date" id="date">4月28日 星期三</div>

        <div class="nongli" id="nongli">农历显示</div>

        <div class="split"/>

        <div class="msg" id="msg">

            王驰东不要哭<br>
            好好做作业，好好玩

        </div>
        <p>
        <div class="test" id="test">获取屏幕信息</div>
    </div>
</div>


<script>
    function updateTime() {
        let date = new Date()
        let timeString = date.getHours() + ':' + ('0' + date.getMinutes()).slice(-2)
        document.getElementById("time").innerHTML = timeString

        if (date.getHours() == 0 & date.getMinutes() <= 3) {
            console.log("更新日期和星期")
            updateDateAndWeek();
            console.log("更新农历")
            updateNongLi();
        }
    }

    updateTime()

    function updateDateAndWeek2() {
        $.get("/kindle/getDateAndWeek", function (result) {
            console.log(result);
            document.getElementById("date").innerHTML = result;
        });
    }

    function updateDateAndWeek() {
        let date = new Date()
        let dateString = (date.getMonth() + 1) + '月' + date.getDate() + '日'
        let weekList = ['日', '一', '二', '三', '四', '五', '六']
        let weekString = '星期' + weekList[date.getDay()]
        document.getElementById("date").innerHTML = dateString + ' ' + weekString
    }

    updateDateAndWeek();

    function updateNongLi() {
        $.get("/kindle/getNongLiShort", function (result) {
            console.log(result);
            document.getElementById("nongli").innerHTML = result;
        });
    }

    updateNongLi();

    // test =============================
    function screen() {
        let height = document.body.clientHeight
        let width = document.body.clientWidth;
        document.getElementById("test").innerHTML = '显示区域 高度：' + height + ' * 宽度：' + width
    }

    screen()

    // test =============================


    function refPreMinute() {
        updateTime();
        //计算定时器，每分钟更新一次
        let date = new Date()
        let next = 60 - date.getSeconds() + 1;
        console.log("下次更新时间：" + next);
        next = next * 1000;
        setTimeout(refPreMinute, next);
    }

    refPreMinute();

</script>
</body>
</html>
