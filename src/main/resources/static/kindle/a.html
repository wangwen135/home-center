

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>时间日期</title>

    <style>
        body {
          color: #000000;
          background-color: #ffffff;
        }

        .page {
          position: fixed;
          width: 100%;
          height: 100%;
        }

        .time_container,
        .date_container {
          width: 100%;
          margin: auto;
          text-align: center;
        }

        .time_container {
          top: 0;
        }

        .date_container {
		  top: 20;
        }

        .time {
          padding-top: 20px;
          font-size: 14rem;
        }

        .date {
          padding-top: 20px;
          font-size: 6rem;
        }
		.nongli{
		  padding-top: 20px;
		  font-size: 6rem;
		}
    </style>
</head>

<body>
    <div class="page">
      <div class="time_container">
          <div class="time" id="time">22:27</div>
      </div>

      <div class="date_container">
          <div class="date" id="date">4月28日</div>
          <div class="date" id="week">星期三</div>
		  <div class="nongli" id="nongli">测试内容</div>
		  
		  <div class="test" id="test">定时刷新测试</div>
      </div>
    </div>


    <script>
      function update() {
        var date = new Date()
        var utc8DiffMinutes = date.getTimezoneOffset() + 480
        date.setMinutes(date.getMinutes() + utc8DiffMinutes)

        var timeString = date.getHours() + ':' + ('0' + date.getMinutes()).slice(-2)
        var dateString = (date.getMonth() + 1) + '月' + date.getDate() + '日'
        var weekList = ['日', '一', '二', '三', '四', '五', '六']
        var weekString = '星期' + weekList[date.getDay()]

        document.getElementById("time").innerHTML = timeString
        document.getElementById("date").innerHTML = dateString
        document.getElementById("week").innerHTML = weekString
      }

      update()
      //setInterval("update()", 60 * 1000)
	  
	  
	  var height = window.screen.height;
	  var width = window.screen.width;
	  
	  document.getElementById("test").innerHTML = '屏幕高度：' + height + '屏幕宽度：' + width
	  
	  setInterval(()=>{location.reload()},1000)
	  
    </script>
</body>
</html>
