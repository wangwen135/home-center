

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>视频播放测试</title>
</head>
<body>

<div style="text-align:center">
    <button onclick="playPause('v1')">播放/暂停</button>
    <button onclick="makeBig('v1')">放大</button>
    <button onclick="makeSmall('v1')">缩小</button>
    <button onclick="makeNormal('v1')">普通</button>
    <br>
    <video id="v1" width="1080" controls = "true">
        <source src="\\wwh-nas\监控\xiaomi_camera_videos\CAMERA_CODE\2022102515\05M48S_1666681548.mp4" type="video/mp4">
        您的浏览器不支持 HTML5 video 标签。
    </video>
</div>

<div style="text-align:center">
    <button onclick="playPause('v2')">播放/暂停</button>
    <button onclick="makeBig('v2')">放大</button>
    <button onclick="makeSmall('v2')">缩小</button>
    <button onclick="makeNormal('v2')">普通</button>
    <br>
    <video id="v2" width="1080" controls = "true">
        <source src="\\wwh-nas\监控\xiaomi_camera_videos\44237c416203\2022102819\39M09S_1666957149.mp4" type="video/mp4">
        您的浏览器不支持 HTML5 video 标签。
    </video>
</div>

<script>

    function getVideo(id){
        return document.getElementById(id);
    }

    function playPause(id)
    {
        myVideo = getVideo(id);
        if (myVideo.paused)
            myVideo.play();
        else
            myVideo.pause();
    }

    function makeBig(id)
    {
        myVideo = getVideo(id);
        myVideo.width=myVideo.width + 100;
    }

    function makeSmall(id)
    {
        myVideo = getVideo(id);
        myVideo.width=myVideo.width - 100;
    }

    function makeNormal(id)
    {
        myVideo = getVideo(id);
        myVideo.width=1080;
    }
</script>

</body>
</html>
