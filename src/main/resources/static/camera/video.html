<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>视频播放测试</title>

    <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/bootstrap/icons/bootstrap-icons.css">

    <script src="/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/js/jquery-3.6.1.min.js"></script>

    <style>
        #cameraDiv > label {
            margin-right: 2rem;
            border-radius: 1rem 1rem 0rem 0rem;
            border-bottom: hidden;
        }

        #dateDiv > label {
            /*margin-left: 0.34rem;*/
            width: 8rem;
        }

        #hourDiv > label {
            width: 2.7rem;
            border-radius: 0rem;
        }

        #minuteDiv > label {
            width: 2.7rem;
            border-radius: 0rem;
            /*padding: 0.35rem 0.68rem;*/
        }

        #controlBar > div {
            display: inline-block;
            margin-right: 24px;
        }

        .badge-my1 {
            background-color: #6c757d;
            border-radius: 5px;
            padding: 4px;
            vertical-align: middle;
            border: 1px solid black;
            color: white;
        }

        .font1 {
            font-size: inherit;
        }
    </style>
</head>
<body>
<div class="container-lg">
    <h2>摄像头视频查看&下载</h2>
    <p class="text-muted">
        相关的视频文件存储在NAS上<br>
        <mark>localhost:/volume1/监控</mark>
        挂载到 localhost的centerOS的
        <mark>/mnt/监控</mark>

    </p>
</div>
<div class="container">
    <div id="cameraSelectHint">
        <label class="h5">选择需要查看的摄像头 </label> &nbsp;
        <label>
            <i class="bi bi-exclamation-triangle-fill text-warning"></i>
            如H265格式的的视频无法播放，请换更新的浏览器
        </label>
    </div>
    <div id="cameraDiv">
        <input type="radio" class="btn-check" name="brd-camera" id="camera-1" autocomplete="off" value="111111" checked>
        <label class="btn btn-outline-primary" for="camera-1">摄像头1 <i class="bi bi-camera-video"></i></label>

        <input type="radio" class="btn-check" name="brd-camera" id="camrea-2" autocomplete="off" value="2222222">
        <label class="btn btn-outline-primary" for="camrea-2">摄像头2 <i class="bi bi-camera-video"></i></label>
    </div>
</div>
<div class="container border border-primary rounded-3" style="padding: 10px;">
    <h5>日期</h5>
    <div id="dateDiv">
        <input type="radio" class="btn-check" name="brd-date" id="2022-1-1" autocomplete="off" checked>
        <label class="btn btn-outline-primary" for="2022-1-1">20220101</label>

        <input type="radio" class="btn-check" name="brd-date" id="2022-1-2" autocomplete="off">
        <label class="btn btn-outline-primary" for="2022-1-2">20220102</label>
    </div>
    <h5 style="padding-top: 5px;">小时</h5>
    <!--<div id="hourDiv" class="btn-group" role="group">-->
    <div id="hourDiv">
        <input type="radio" class="btn-check" name="brd-hour" id="1" autocomplete="off" checked>
        <label class="btn btn-outline-primary" for="1">01</label>

        <input type="radio" class="btn-check" name="brd-hour" id="2" autocomplete="off">
        <label class="btn btn-outline-primary" for="2">02</label>

        <input type="radio" class="btn-check" name="brd-hour" id="3" autocomplete="off">
        <label class="btn btn-outline-primary" for="3">03</label>
    </div>

    <h5 style="padding-top: 5px;">分钟</h5>
    <div id="minuteDiv">
        <input type="radio" class="btn-check" name="brd-minute" id="m-1" autocomplete="off" checked>
        <label class="btn btn-outline-primary" for="m-1">01</label>

        <input type="radio" class="btn-check" name="brd-minute" id="m-2" autocomplete="off">
        <label class="btn btn-outline-primary" for="m-2">02</label>

        <input type="radio" class="btn-check" name="brd-minute" id="m-3" autocomplete="off">
        <label class="btn btn-outline-primary" for="m-3">03</label>
    </div>
</div>
<br>

<div id="controlBar" class="container border" style="text-align:center">
    <div>
        <span class="badge-my1"><i id="videoInfo" class="bi bi-film"> 1920x1080</i></span>
        <!--<span class="badge bg-secondary"><i class="bi bi-film">1920x1080</i></span>-->
    </div>

    <div>
        <button id="btnPlayPause" class="btn btn-success" onclick="playPause()"><i class="bi bi-play">播放</i></button>
        <div style="width: 135px; display: inline-block">
            <div class="input-group input-group-sm">
                <!--<input id="btnCurrentTime" type="text" class="form-control" onkeyup="value=value.replace(/[^\d.]/g,'')">-->
                <input id="btnCurrentTime" type="number" class="form-control" step="0.01" min="0" max="100" value="0"
                       required="true" title="鼠标滚轮控制逐帧播放效果">
                <button type="submit" class="btn btn-success" onclick="skip()" title="跳转到指定位置"><i
                        class="bi bi-skip-end-circle"></i>
                </button>
            </div>
        </div>
    </div>

    <div>
        <button class="btn btn-primary" onclick="makeBig()"><i class="bi bi-zoom-in">放大</i></button>
        <button class="btn btn-primary" onclick="makeSmall()"><i class="bi bi-zoom-out">缩小</i></button>
        <button class="btn btn-secondary" onclick="makeNormal()"><i class="bi bi-fullscreen-exit">普通</i></button>
        <span class="badge rounded-pill bg-light text-dark font1" style="min-width: 125px">
            <i id="txtVideoWidth" class="bi bi-aspect-ratio">1080x608</i>
        </span>
    </div>

    <div>
        <button class="btn btn-outline-dark" onclick="slowDown()"><i class="bi bi-skip-backward">慢放</i></button>
        <button class="btn btn-outline-success" onclick="normalSpeed()"><i class="bi bi-skip-end">正常</i></button>
        <button class="btn btn-outline-primary" onclick="speedUp()"><i class="bi bi-skip-forward">快放</i></button>
        <span class="badge rounded-pill bg-light text-dark" style="width: 60px">
            <span id="txtVideoRate">1</span>倍速
        </span>
    </div>

    <button class="btn btn-light" onclick="downloadVideo()"><i class="bi bi-cloud-download">下载视频</i></button>
</div>

<div class="border" style="text-align:center">

    <video id="cVideo" width="1080" controls="true" src="">
        <!--<source src="/camera/getVideo?code=CAMERA_CODE&date=20221105&hour=17&minute=19" type="video/mp4">-->
        您的浏览器不支持 HTML5 video 标签。
    </video>
</div>


<script>

    // fetch('/camera/video/minute?code=CAMERA_CODE&date=20221105&hour=17')
    //     .then(response => response.json()) //定义返回的类型和数据格式
    //     .then(data => console.log(data)) // 返回的数据
    $(document).ready(function () {
        //页面装载后自动加载摄像头列表
        initCamera();
    });

    /**
     * 加载摄像头列表
     */
    function initCamera() {
        $.get("/camera/list", function (result) {
            let cDiv = $("#cameraDiv");
            cDiv.empty();
            $.each(result, function (index, e) {
                cDiv.append('<input type="radio" class="btn-check" name="brd-camera" id="camera-' + index + '" autocomplete="off" value="' + e.code + '" onclick="onCameraChange()">');
                cDiv.append('<label class="btn btn-outline-primary" for="camera-' + index + '">' + e.name + ' <i class="bi bi-camera-video"/></label>');
            });
            //选中第一个
            $('#camera-0').attr("checked", 'checked');
            //添加点击事件
            // $("#cameraDiv").on("click", "input:radio", onCameraChange);
            onCameraChange();
        });
    }

    /**
     * 摄像头改变后加载日期列表
     */
    function onCameraChange() {
        let cameraId = $("#cameraDiv > input:radio:checked").val();
        // console.log("选择的摄像头是：" + cameraId);

        let url = "/camera/video/date?code=" + cameraId;
        $.get(url, function (result) {
            let dDiv = $("#dateDiv");
            dDiv.empty();
            $.each(result, function (index, e) {
                dDiv.append('<input type="radio" class="btn-check" name="brd-date" id="date-' + index + '" autocomplete="off" value="' + e + '" onclick="onDateChange()">');
                dDiv.append('<label class="btn btn-outline-primary" for="date-' + index + '">' + e + '</label>');
            });
            //选中最后一个
            $("#dateDiv > input:radio:last").attr("checked", 'checked');
            //添加点击事件
            // $("#dateDiv").on("click", "input:radio", onDateChange);
            onDateChange();
        });
    }

    /**
     * 日期改变后加载小时列表
     */
    function onDateChange() {
        let cameraId = $("#cameraDiv > input:radio:checked").val();
        let date = $("#dateDiv > input:radio:checked").val();
        // console.log("选择的日期是：" + date);

        let url = "/camera/video/hour?code=" + cameraId + "&date=" + date;
        $.get(url, function (result) {
            let hDiv = $("#hourDiv");
            hDiv.empty();
            $.each(result, function (index, e) {
                hDiv.append('<input type="radio" class="btn-check" name="brd-hour" id="hour-' + index + '" autocomplete="off" value="' + e + '" onclick="onHourChange()">');
                hDiv.append('<label class="btn btn-outline-primary" for="hour-' + index + '">' + e + '</label>');
            });
            //选中最后一个
            $("#hourDiv > input:radio:last").attr("checked", 'checked');

            onHourChange();
        });
    }

    /**
     * 小时改变后加载分钟
     */
    function onHourChange() {
        let cameraId = $("#cameraDiv > input:radio:checked").val();
        let date = $("#dateDiv > input:radio:checked").val();
        let hour = $("#hourDiv > input:radio:checked").val();

        // console.log("选择的小时是：" + hour);

        let url = "/camera/video/minute?code=" + cameraId + "&date=" + date + "&hour=" + hour;
        $.get(url, function (result) {
            let mDiv = $("#minuteDiv");
            mDiv.empty();
            $.each(result, function (index, e) {
                mDiv.append('<input type="radio" class="btn-check" name="brd-minute" id="minute-' + index + '" autocomplete="off" value="' + e + '" onclick="onMinuteChange()">');
                mDiv.append('<label class="btn btn-outline-primary" for="minute-' + index + '">' + e + '</label>');
            });
            //选中最后一个
            $("#minuteDiv > input:radio:first").attr("checked", 'checked');

            //触发下级方法
            onMinuteChange();
        });
    }

    //首次加载页面不自动播放视频
    let firstLoad = true;

    /**
     * 分钟改变后加载视频
     */
    function onMinuteChange() {
        let cameraId = $("#cameraDiv > input:radio:checked").val();
        let date = $("#dateDiv > input:radio:checked").val();
        let hour = $("#hourDiv > input:radio:checked").val();
        let minute = $("#minuteDiv > input:radio:checked").val();

        // console.log("选择的分钟是：" + minute);
        let url = "/camera/getVideo?code=" + cameraId + "&date=" + date + "&hour=" + hour + "&minute=" + minute;
        // console.log("视频路径是：" + url);

        let oldRate = myVideo.playbackRate;

        //设置视频路径
        myVideo.src = url;
        myVideo.load();

        myVideo.playbackRate = oldRate;

        if (firstLoad) {
            firstLoad = false;
        } else {
            myVideo.play();
        }
    }

    //chrome 鼠标滚轮控制进度
    let btnCT = document.getElementById("btnCurrentTime");
    btnCT.onmousewheel = mousewheel;
    btnCT.onchange = valueChange;

    function mousewheel(e) {
        e.preventDefault();//通知浏览器不执行默认的动作
        let v = parseFloat(this.value);
        if (e.wheelDelta < 0) { //下
            if (v <= 0) {
                return;
            }
            v = v - 0.01;
        } else { //上
            if (v >= 100) {
                return;
            }
            v = v + 0.01;
        }
        let v2 = v.toFixed(2);
        this.value = v2;
        myVideo.currentTime = v2;
    }

    function valueChange() {
        myVideo.currentTime = this.value;
    }

    const myVideo = document.getElementById("cVideo");

    myVideo.addEventListener('play', function () {
        $("#btnPlayPause").html('<i class="bi bi-pause">暂停</i>');
        $("#btnCurrentTime").val(myVideo.currentTime)
    })

    myVideo.addEventListener('pause', function () {
        $("#btnPlayPause").html('<i class="bi bi-play">播放</i>');
        $("#btnCurrentTime").val(myVideo.currentTime)
    })

    myVideo.addEventListener('ratechange', function () {
        $("#txtVideoRate").text(myVideo.playbackRate);
    })

    //视频播放时间更新
    myVideo.addEventListener('timeupdate', function () {
        $("#btnCurrentTime").val(myVideo.currentTime)
    })

    //视频数据已加载
    myVideo.addEventListener("loadedmetadata", function () {
        $("#videoInfo").text(" " + myVideo.videoWidth + "x" + myVideo.videoHeight);
        updateVideoWidthTxt();
    });

    // 本视频播放结束，自动播放下一个
    myVideo.addEventListener('ended', function (e) {
        let mList = $("#minuteDiv  input:radio:checked").nextAll("input:radio");
        if (mList.length > 0) {
            mList[0].click();
        }
    })

    //播放暂停
    function playPause() {
        if (myVideo.paused) {
            myVideo.play();
            $("#btnPlayPause").html('<i class="bi bi-pause">暂停</i>');
            ;
        } else {
            myVideo.pause();
            $("#btnPlayPause").html('<i class="bi bi-play">播放</i>');
        }
    }

    //跳过一段
    function skip() {
        myVideo.currentTime = $("#btnCurrentTime").val();
    }

    function updateVideoWidthTxt() {
        let text = myVideo.clientWidth + "x" + myVideo.clientHeight;
        $("#txtVideoWidth").text(text);
    }

    //增大
    function makeBig() {
        if (myVideo.width >= 10080) {
            return;
        }
        myVideo.width = myVideo.width + 100;
        updateVideoWidthTxt();
    }

    //缩小
    function makeSmall() {
        if (myVideo.width <= 100) {
            return;
        }
        myVideo.width = myVideo.width - 100;
        updateVideoWidthTxt();
    }

    //恢复正常
    function makeNormal() {
        myVideo.width = 1080;
        updateVideoWidthTxt();
    }

    //快放
    function speedUp() {
        if (myVideo.playbackRate >= 16) {
            return;
        }
        myVideo.playbackRate = myVideo.playbackRate + 0.25;
    }

    //慢放
    function slowDown() {
        if (myVideo.playbackRate <= 0.25) {
            return;
        }
        myVideo.playbackRate = myVideo.playbackRate - 0.25;
    }

    //正常速度
    function normalSpeed() {
        myVideo.playbackRate = 1;
    }

    //下载视频
    function downloadVideo() {
        window.location.href = myVideo.src;
    }
</script>

</body>
</html>
