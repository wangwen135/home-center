<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Home Center 公开导航">
    <title>Home Center</title>
    <link rel="stylesheet" href="/css/app-theme.css?v=20260614-theme-icon">
    <link rel="stylesheet" href="/css/nav.css?v=20260614-login-size">
    <script src="/js/app-theme.js?v=20260614-theme-icon"></script>
</head>
<body class="hc-app">
<canvas id="bg-canvas" aria-hidden="true"></canvas>

<div class="page-shell">
    <header class="site-header" role="banner">
        <h1>Home Center</h1>
    </header>

    <div class="top-actions" aria-label="页面操作">
        <button class="hc-theme-toggle" type="button" aria-label="切换深浅色主题">
            <span class="hc-theme-toggle-icon" aria-hidden="true"></span>
            <span data-theme-toggle-text>深色</span>
        </button>
        <a class="login-link" href="/login.html">登录</a>
    </div>

    <main class="nav-panel" role="main">
        <div class="search-container">
            <input
                    id="navSearch"
                    class="search-input"
                    type="search"
                    placeholder="搜索导航..."
                    aria-label="搜索导航链接">
        </div>
        <div id="navContent" class="nav-content" aria-live="polite">
            <div class="empty-message">导航加载中...</div>
        </div>
    </main>
</div>

<footer class="site-footer" role="contentinfo">© Home Center | Auth wwh</footer>

<script src="/js/main.js"></script>
<script src="/js/bg-particles.js"></script>
</body>
</html>
