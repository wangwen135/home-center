# 服务端口号，默认80
server:
  port: ${SERVER_PORT:8866}
spring:
  # 服务名称
  application:
    name: home-center


  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/home_center?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=false}
    username: ${DB_USERNAME:home_center}
    password: ${DB_PASSWORD:change-me}
    type: com.alibaba.druid.pool.DruidDataSource
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

mybatis-plus:
  mapper-locations: classpath*:mapper/*Mapper.xml

weather:
  provider: 和风
  config:
    hefeng:
      now-url: ${WEATHER_HEFENG_NOW_URL:https://devapi.qweather.com/v7/weather/now?location=${WEATHER_LOCATION:101010100}&key=${WEATHER_HEFENG_KEY:change-me}}

image:
  base-path: ${IMAGE_BASE_PATH:/tmp/home-center/images}
