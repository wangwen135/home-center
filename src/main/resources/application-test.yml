# 服务端口号，默认80
server:
  port: 8866
spring:
  # 服务名称
  application:
    name: home-center


  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/home_center?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=false}
    username: ${DB_USERNAME:home_center}
    password: ${DB_PASSWORD:change-me}
    type: com.alibaba.druid.pool.DruidDataSource
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}

  thymeleaf:
    cache=false:

mybatis-plus:
  configuration:
    #控制台打印完整带参数SQL语句
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    mapper-locations: classpath*:mapper/*Mapper.xml

weather:
  provider: 和风
  config:
    hefeng:
      now-url: ${WEATHER_HEFENG_NOW_URL:https://devapi.qweather.com/v7/weather/now?location=${WEATHER_LOCATION:101010100}&key=${WEATHER_HEFENG_KEY:change-me}}

camera-video:
  base-path: ${CAMERA_VIDEO_BASE_PATH:/tmp/home-center/camera-videos}

image:
  base-path: ${IMAGE_BASE_PATH:/tmp/home-center/images}

notes:
  base-path: ${NOTES_BASE_PATH:/tmp/home-center/notes}
  recycle-base-path: ${NOTES_RECYCLE_BASE_PATH:/tmp/home-center/notes-recycle}
